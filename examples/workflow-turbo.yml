# Example: Distributed Turborepo build using DxCore with Tailscale networking
name: Distributed Build (Turbo)
on: [push]

jobs:
  coordinator:
    runs-on: ubuntu-latest
    steps:
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          hostname: coord-${{ github.run_id }}
      - run: sudo tailscale serve --bg --http 80 http://localhost:4000
      - uses: join-with/dxcore-coordinator-action@v1
        with:
          token: ${{ secrets.DXCORE_TOKEN }}

  agents:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          hostname: agent-${{ matrix.agent }}-${{ github.run_id }}
      - uses: join-with/dxcore-agent-action@v1
        with:
          coordinator-url: http://coord-${{ github.run_id }}
          token: ${{ secrets.DXCORE_TOKEN }}

  dispatcher:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          hostname: dispatch-${{ github.run_id }}
      - uses: join-with/dxcore-dispatch-action@v1
        with:
          coordinator-url: http://coord-${{ github.run_id }}
          command: npx turbo run build test lint --dry=json
          token: ${{ secrets.DXCORE_TOKEN }}

  cleanup:
    runs-on: ubuntu-latest
    needs: [dispatcher]
    if: always()
    steps:
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          hostname: cleanup-${{ github.run_id }}
      - uses: join-with/dxcore-shutdown-action@v1
        with:
          coordinator-url: http://coord-${{ github.run_id }}
          token: ${{ secrets.DXCORE_TOKEN }}
