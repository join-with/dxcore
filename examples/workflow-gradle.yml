# Example: Distributed Gradle build using DxCore with Tailscale networking
name: Distributed Build (Gradle)
on: [push]

jobs:
  coordinator:
    runs-on: ubuntu-latest
    services:
      gradle-cache:
        image: gradle/build-cache-node:21.2
        ports:
          - 5071:5071
    steps:
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          hostname: coord-${{ github.run_id }}
      - run: |
          sudo tailscale serve --bg --http 80 http://localhost:4000
          sudo tailscale serve --bg --tcp 5071 tcp://localhost:5071
      - uses: join-with/dxcore-coordinator-action@v1
        with:
          token: ${{ secrets.DXCORE_TOKEN }}

  agents:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          hostname: agent-${{ matrix.agent }}-${{ github.run_id }}
      - uses: join-with/dxcore-agent-action@v1
        with:
          coordinator-url: http://coord-${{ github.run_id }}
          token: ${{ secrets.DXCORE_TOKEN }}
          build-system: gradle
        env:
          GRADLE_CACHE_URL: http://coord-${{ github.run_id }}:5071/cache/

  dispatcher:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          hostname: dispatch-${{ github.run_id }}
      - uses: join-with/dxcore-dispatch-action@v1
        with:
          coordinator-url: http://coord-${{ github.run_id }}
          command: ./gradlew -q exportDxcoreGraph
          token: ${{ secrets.DXCORE_TOKEN }}
          build-system: gradle

  cleanup:
    runs-on: ubuntu-latest
    needs: [dispatcher, agents]
    if: always()
    steps:
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          hostname: cleanup-${{ github.run_id }}
      - uses: join-with/dxcore-shutdown-action@v1
        with:
          coordinator-url: http://coord-${{ github.run_id }}
          token: ${{ secrets.DXCORE_TOKEN }}
