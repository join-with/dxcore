name: E2E Actions

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to test (e.g. v0.1.0). Defaults to latest."
        required: false
        default: "latest"

jobs:
  context:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      token: ${{ steps.compute.outputs.token }}
      coordinator_url: ${{ steps.compute.outputs.coordinator_url }}
      version: ${{ steps.compute.outputs.version }}
    steps:
      - name: Compute shared context
        id: compute
        run: |
          TOKEN=$(echo -n "${{ secrets.TS_OAUTH_SECRET }}${{ github.run_id }}" | sha256sum | head -c 40)
          echo "token=tdx_ci_${TOKEN}" >> "$GITHUB_OUTPUT"
          echo "coordinator_url=http://dxcore-e2e-coord-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          echo "version=${{ inputs.version || 'latest' }}" >> "$GITHUB_OUTPUT"

  coordinator:
    runs-on: ubuntu-latest
    needs: [context]
    timeout-minutes: 15
    steps:
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:dxcore-ci
          hostname: dxcore-e2e-coord-${{ github.run_id }}
      - run: sudo tailscale serve --bg --http 80 http://localhost:4000
      - uses: join-with/dxcore-coordinator-action@v0
        with:
          token: ${{ needs.context.outputs.token }}
          version: ${{ needs.context.outputs.version }}

  agents:
    runs-on: ubuntu-latest
    needs: [context]
    strategy:
      fail-fast: false
      matrix:
        agent: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
      - run: cd examples/turbo-monorepo && pnpm install --frozen-lockfile
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:dxcore-ci
          hostname: dxcore-e2e-agent-${{ matrix.agent }}-${{ github.run_id }}
      - uses: join-with/dxcore-agent-action@v0
        with:
          coordinator-url: ${{ needs.context.outputs.coordinator_url }}
          token: ${{ needs.context.outputs.token }}
          work-dir: examples/turbo-monorepo
          version: ${{ needs.context.outputs.version }}

  dispatcher:
    runs-on: ubuntu-latest
    needs: [context]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
      - run: cd examples/turbo-monorepo && pnpm install --frozen-lockfile
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:dxcore-ci
          hostname: dxcore-e2e-dispatch-${{ github.run_id }}
      - uses: join-with/dxcore-dispatch-action@v0
        with:
          coordinator-url: ${{ needs.context.outputs.coordinator_url }}
          command: npx turbo run build test lint --dry=json
          token: ${{ needs.context.outputs.token }}
          work-dir: examples/turbo-monorepo
          version: ${{ needs.context.outputs.version }}

  cleanup:
    runs-on: ubuntu-latest
    needs: [context, dispatcher]
    if: always()
    steps:
      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:dxcore-ci
          hostname: dxcore-e2e-cleanup-${{ github.run_id }}
      - uses: join-with/dxcore-shutdown-action@v0
        with:
          coordinator-url: ${{ needs.context.outputs.coordinator_url }}
          token: ${{ needs.context.outputs.token }}
          version: ${{ needs.context.outputs.version }}
