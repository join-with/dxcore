name: CLA Assistant
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.comment.body == 'recheck')
    steps:
      - uses: contributor-assistant/github-action@v2
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "CLA.md"
          branch: "main"
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign our [Contributor License Agreement](CLA.md).

            Please read the CLA document and comment below with:
            `I have read the CLA Document and I hereby sign the CLA`
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
